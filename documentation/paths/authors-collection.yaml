get:
  tags: [Authors]
  summary: List authors
  operationId: listAuthors
  parameters:
    - $ref: '../components/parameters.yaml#/Page'
    - $ref: '../components/parameters.yaml#/PerPage'
  responses:
    '200':
      description: Paginated author list
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '../components/schemas.yaml#/Author'
              meta:
                $ref: '../components/schemas.yaml#/PaginationMeta'

post:
  tags: [Authors]
  summary: Create author
  operationId: createAuthor
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas.yaml#/AuthorInput'
  responses:
    '201':
      description: Author created
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../components/schemas.yaml#/Author'
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/ErrorResponse'
