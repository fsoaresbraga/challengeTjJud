get:
  tags: [Books]
  summary: List books
  operationId: listBooks
  parameters:
    - $ref: '../components/parameters.yaml#/Page'
    - $ref: '../components/parameters.yaml#/PerPage'
  responses:
    '200':
      description: Paginated book list
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '../components/schemas.yaml#/Book'
              meta:
                $ref: '../components/schemas.yaml#/PaginationMeta'

post:
  tags: [Books]
  summary: Create book
  operationId: createBook
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas.yaml#/BookInput'
  responses:
    '201':
      description: Book created
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '../components/schemas.yaml#/Book'
    '422':
      $ref: '../openapi.yaml#/components/responses/ValidationError'
