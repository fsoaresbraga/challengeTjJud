Author:
  type: object
  properties:
    authorId:
      type: integer
      example: 1
    name:
      type: string
      maxLength: 40
      example: Machado de Assis

Subject:
  type: object
  properties:
    subjectId:
      type: integer
      example: 1
    description:
      type: string
      maxLength: 20
      example: Romance

Book:
  type: object
  properties:
    bookId:
      type: integer
      example: 1
    title:
      type: string
      maxLength: 40
      example: Dom Casmurro
    publisher:
      type: string
      maxLength: 40
      example: Garnier
    edition:
      type: integer
      example: 1
    publicationYear:
      type: integer
      example: 1899
    price:
      type: string
      example: "49.90"
    authors:
      type: array
      items:
        $ref: '#/Author'
    subjects:
      type: array
      items:
        $ref: '#/Subject'

BookInput:
  type: object
  required: [title, publisher, edition, publicationYear, price, authors, subjects]
  properties:
    title:
      type: string
      maxLength: 40
    publisher:
      type: string
      maxLength: 40
    edition:
      type: integer
      minimum: 1
    publicationYear:
      type: integer
      minimum: 1000
      maximum: 9999
    price:
      type: number
      minimum: 0
    authors:
      type: array
      minItems: 1
      items:
        type: integer
    subjects:
      type: array
      minItems: 1
      items:
        type: integer

AuthorInput:
  type: object
  required: [name]
  properties:
    name:
      type: string
      maxLength: 40

SubjectInput:
  type: object
  required: [description]
  properties:
    description:
      type: string
      maxLength: 20

ErrorResponse:
  type: object
  properties:
    message:
      type: string
    errors:
      nullable: true
      oneOf:
        - type: object
          additionalProperties:
            type: array
            items:
              type: string
        - type: 'null'
    code:
      type: string
      enum:
        - VALIDATION_ERROR
        - BOOK_NOT_FOUND
        - AUTHOR_NOT_FOUND
        - SUBJECT_NOT_FOUND
        - DUPLICATE_ASSOCIATION
        - NOT_FOUND
        - DATABASE_ERROR

PaginationMeta:
  type: object
  properties:
    current_page:
      type: integer
    last_page:
      type: integer
    per_page:
      type: integer
    total:
      type: integer
