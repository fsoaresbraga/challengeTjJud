Page:
  name: page
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1
  description: Page number

PerPage:
  name: perPage
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 15
  description: Items per page (max 100)

BookId:
  name: book
  in: path
  required: true
  schema:
    type: integer
  description: Book ID (cod_livro)

AuthorId:
  name: author
  in: path
  required: true
  schema:
    type: integer
  description: Author ID (cod_autor)

SubjectId:
  name: subject
  in: path
  required: true
  schema:
    type: integer
  description: Subject ID (cod_assunto)
