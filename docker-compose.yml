services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tjjud_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - tjjud
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: tjjud_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tjjud
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: tjjud_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tjjud}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-tjjud}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - tjjud_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tjjud

networks:
  tjjud:
    driver: bridge

volumes:
  tjjud_mysql_data:
    driver: local
